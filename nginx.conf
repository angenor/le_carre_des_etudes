server {
    listen 80;
    server_name lecarredesetudes.com www.lecarredesetudes.com;
    return 301 https://lecarredesetudes.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.lecarredesetudes.com;

    ssl_certificate /etc/letsencrypt/live/lecarredesetudes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lecarredesetudes.com/privkey.pem;

    return 301 https://lecarredesetudes.com$request_uri;
}

server {
    listen 443 ssl;
    server_name lecarredesetudes.com;

    ssl_certificate /etc/letsencrypt/live/lecarredesetudes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lecarredesetudes.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

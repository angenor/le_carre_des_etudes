<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" rx="0"/>
  <!-- Magazine outline -->
  <rect x="440" y="140" width="320" height="440" rx="12" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="2"/>
  <rect x="460" y="160" width="280" height="400" rx="8" fill="white" fill-opacity="0.1"/>
  <!-- Title lines -->
  <rect x="500" y="220" width="200" height="12" rx="6" fill="white" fill-opacity="0.5"/>
  <rect x="520" y="248" width="160" height="8" rx="4" fill="white" fill-opacity="0.3"/>
  <!-- Image placeholder -->
  <rect x="490" y="285" width="220" height="140" rx="6" fill="white" fill-opacity="0.15"/>
  <circle cx="600" cy="355" r="30" fill="white" fill-opacity="0.2"/>
  <!-- Text lines -->
  <rect x="490" y="450" width="220" height="6" rx="3" fill="white" fill-opacity="0.25"/>
  <rect x="510" y="468" width="180" height="6" rx="3" fill="white" fill-opacity="0.2"/>
  <rect x="520" y="486" width="160" height="6" rx="3" fill="white" fill-opacity="0.15"/>
  <!-- Decorative dots -->
  <circle cx="200" cy="200" r="60" fill="white" fill-opacity="0.05"/>
  <circle cx="1000" cy="600" r="80" fill="white" fill-opacity="0.05"/>
  <circle cx="150" cy="600" r="40" fill="white" fill-opacity="0.03"/>
  <circle cx="1050" cy="180" r="50" fill="white" fill-opacity="0.04"/>
  <!-- Bottom text -->
  <text x="600" y="680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="white" fill-opacity="0.4">Le Carre des Etudes</text>
  <text x="600" y="710" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" fill-opacity="0.25">Image de presentation — a remplacer</text>
</svg>

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/production.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin-secret}
    volumes:
      - sqlite-data:/app/data
      - uploads:/app/.output/public/uploads
    restart: unless-stopped

volumes:
  sqlite-data:
  uploads:

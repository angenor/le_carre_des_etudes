services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/production.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin-secret}
      - NUXT_SESSION_SECURE=${NUXT_SESSION_SECURE:-true}
    volumes:
      - sqlite-data:/app/data
      - uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  sqlite-data:
  uploads:
  letsencrypt:
    external: true
    name: le_carre_des_etudes_letsencrypt
